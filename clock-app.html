<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock - One UI</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "Segoe UI", sans-serif; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { padding: 20px; font-size: 24px; font-weight: 600; display: flex; justify-content: space-between; }
        .back-btn { text-decoration: none; color: white; }

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        .hidden { display: none; }

        /* World Clock Styles */
        .city-card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .city-name { font-size: 18px; text-align: left; }
        .city-time { font-size: 22px; font-weight: bold; }

        /* Stopwatch Styles */
        .timer-display { font-size: 60px; font-weight: 200; margin: 50px 0; font-variant-numeric: tabular-nums; }
        .controls { display: flex; justify-content: center; gap: 20px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; }
        .start { background: #2e7d32; color: white; }
        .stop { background: #c62828; color: white; }
        .reset { background: #424242; color: white; }

        /* Bottom Tabs */
        .tabs { height: 70px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .tab { font-size: 12px; color: #888; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .tab.active { color: #3b82f6; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="index.html" class="back-btn">⬅</a>
        <span id="header-title">World Clock</span>
        <span onclick="alert('Add City coming soon!')">➕</span>
    </div>

    <div class="content" id="main-content">
        <div id="world-clock-view">
            <div class="city-card">
                <div class="city-name">Hamilton <br><small>New Zealand</small></div>
                <div class="city-time" id="time-nz">00:00</div>
            </div>
            <div class="city-card">
                <div class="city-name">Manila <br><small>Philippines</small></div>
                <div class="city-time" id="time-ph">00:00</div>
            </div>
            <div class="city-card">
                <div class="city-name">New York <br><small>USA</small></div>
                <div class="city-time" id="time-ny">00:00</div>
            </div>
        </div>

        <div id="stopwatch-view" class="hidden">
            <div class="timer-display" id="sw-display">00:00.00</div>
            <div class="controls">
                <button class="btn reset" onclick="resetSW()">Reset</button>
                <button class="btn start" id="sw-btn" onclick="toggleSW()">Start</button>
            </div>
        </div>

        <div id="timer-view" class="hidden">
            <div class="timer-display">10:00</div>
            <p>Timer Function coming soon...</p>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('world')">🌐<span>World</span></div>
        <div class="tab" onclick="showTab('stopwatch')">⏱️<span>Stopwatch</span></div>
        <div class="tab" onclick="showTab('timer')">⏳<span>Timer</span></div>
    </div>
</div>

<script>
    // WORLD CLOCK LOGIC
    function updateWorldClocks() {
        const options = { hour: '2-digit', minute: '2-digit', hour12: false };
        
        document.getElementById('time-nz').innerText = new Date().toLocaleTimeString('en-GB', { ...options, timeZone: 'Pacific/Auckland' });
        document.getElementById('time-ph').innerText = new Date().toLocaleTimeString('en-GB', { ...options, timeZone: 'Asia/Manila' });
        document.getElementById('time-ny').innerText = new Date().toLocaleTimeString('en-GB', { ...options, timeZone: 'America/New_York' });
    }
    setInterval(updateWorldClocks, 1000);

    // TAB SWITCHING
    function showTab(tab) {
        document.getElementById('world-clock-view').classList.add('hidden');
        document.getElementById('stopwatch-view').classList.add('hidden');
        document.getElementById('timer-view').classList.add('hidden');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

        if(tab === 'world') {
            document.getElementById('world-clock-view').classList.remove('hidden');
            document.getElementById('header-title').innerText = "World Clock";
            event.currentTarget.classList.add('active');
        } else if(tab === 'stopwatch') {
            document.getElementById('stopwatch-view').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Stopwatch";
            event.currentTarget.classList.add('active');
        } else if(tab === 'timer') {
            document.getElementById('timer-view').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Timer";
            event.currentTarget.classList.add('active');
        }
    }

    // STOPWATCH LOGIC
    let swTime = 0, swInterval;
    function toggleSW() {
        const btn = document.getElementById('sw-btn');
        if(btn.innerText === "Start") {
            swInterval = setInterval(() => {
                swTime += 10;
                let date = new Date(swTime);
                document.getElementById('sw-display').innerText = 
                    String(date.getUTCMinutes()).padStart(2, '0') + ":" + 
                    String(date.getUTCSeconds()).padStart(2, '0') + "." + 
                    String(Math.floor(date.getUTCMilliseconds()/10)).padStart(2, '0');
            }, 10);
            btn.innerText = "Stop"; btn.className = "btn stop";
        } else {
            clearInterval(swInterval);
            btn.innerText = "Start"; btn.className = "btn start";
        }
    }
    function resetSW() {
        clearInterval(swInterval);
        swTime = 0;
        document.getElementById('sw-display').innerText = "00:00.00";
        document.getElementById('sw-btn').innerText = "Start";
        document.getElementById('sw-btn').className = "btn start";
    }

    updateWorldClocks();
</script>

</body>
</html>
