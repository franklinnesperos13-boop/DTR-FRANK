<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTR System - Hamilton</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 10px; font-size: 13px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-top: 10px solid #c0392b; border-radius: 8px; position: relative; }
        
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-weight: bold; color: #555; margin-bottom: 4px; font-size: 11px; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f4f4f4; border: 1px solid #ddd; padding: 10px; font-size: 11px; }
        td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        
        .week-spacer { height: 25px; background: #eee; border: none; }
        .time-select { width: 100%; border: none; background: transparent; font-size: 12px; }
        
        .signature-section { margin-top: 20px; display: flex; align-items: center; gap: 10px; }
        #sig-image { border-bottom: 1px solid #000; width: 200px; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fafafa; }

        /* Signature Modal */
        #sig-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; }
        canvas { border: 1px solid #000; background: #fff; cursor: crosshair; }
        
        .buttons { margin-top: 25px; text-align: center; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; }
        .btn-print { background: #c0392b; color: white; }
        .btn-clear { background: #7f8c8d; color: white; }

        @media print {
            .no-print, .btn, #sig-modal { display: none !important; }
            .container { border: none; width: 100%; box-shadow: none; }
            select { -webkit-appearance: none; appearance: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-grid">
        <div class="field">
            <label>NAME:</label>
            <select id="userName" onchange="saveData()">
                <option value="FRANKLIN NESPEROS">FRANKLIN NESPEROS</option>
                <option value="ELMER CABAÑA">ELMER CABAÑA</option>
                <option value="LARRY LABRADOR">LARRY LABRADOR</option>
            </select>
        </div>
        <div class="field">
            <label>DATE START:</label>
            <input type="date" id="dateStart" onchange="updateDates()">
        </div>
        <div class="field">
            <label>POSITION:</label>
            <input type="text" value="Plasterer" readonly>
        </div>
        <div class="field">
            <label>PERIOD ENDING (14 DAYS):</label>
            <input type="text" id="dateEnd" readonly>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="18%">DAY & DATE</th>
                <th width="15%">START</th>
                <th width="15%">FINISH</th>
                <th width="8%">NO BREAK</th>
                <th width="10%">TOTAL</th>
                <th>SITE / COMMENTS</th>
            </tr>
        </thead>
        <tbody id="dtrBody"></tbody>
    </table>

    <div class="signature-section">
        <label>SIGNATURE:</label>
        <div id="sig-image" onclick="openSig()">Click to Sign</div>
    </div>

    <div class="buttons no-print">
        <button class="btn btn-save" onclick="saveData()">SAVE PROGRESS</button>
        <button class="btn btn-print" onclick="window.print()">PRINT TO PDF</button>
    </div>
</div>

<div id="sig-modal">
    <div class="modal-content">
        <h3>Digital Signature</h3>
        <canvas id="sig-canvas" width="400" height="200"></canvas><br><br>
        <button class="btn btn-clear" onclick="clearSig()">Clear</button>
        <button class="btn btn-save" onclick="saveSig()">Confirm Signature</button>
        <button class="btn btn-clear" style="background:#e74c3c" onclick="closeSig()">Close</button>
    </div>
</div>

<script>
    const dtrBody = document.getElementById('dtrBody');
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    function createTimeOptions() {
        let options = '<option value="">--:--</option>';
        const periods = ["AM", "PM"];
        for (let p of periods) {
            for (let h = 1; h <= 12; h++) {
                for (let m of ["00", "30"]) {
                    let time = `${h}:${m} ${p}`;
                    options += `<option value="${time}">${time}</option>`;
                }
            }
        }
        return options;
    }

    function initTable() {
        dtrBody.innerHTML = "";
        const timeOptions = createTimeOptions();
        for (let i = 0; i < 14; i++) {
            if (i === 7) {
                dtrBody.innerHTML += `<tr class="week-spacer"><td colspan="6"></td></tr>`;
            }
            dtrBody.innerHTML += `
                <tr>
                    <td id="day-date-${i}">${days[i % 7]}</td>
                    <td><select class="time-select" id="start-${i}" onchange="saveData()">${timeOptions}</select></td>
                    <td><select class="time-select" id="finish-${i}" onchange="saveData()">${timeOptions}</select></td>
                    <td><input type="checkbox" id="break-${i}" onchange="saveData()"></td>
                    <td id="total-${i}">0.0</td>
                    <td><input type="text" style="width:90%;border:none;" id="site-${i}" placeholder="Search address..." onchange="saveData()"></td>
                </tr>
            `;
        }
        loadSavedData();
    }

    function updateDates() {
        const startVal = document.getElementById('dateStart').value;
        if (!startVal) return;
        
        let startDate = new Date(startVal);
        let endDate = new Date(startVal);
        endDate.setDate(startDate.getDate() + 13);
        document.getElementById('dateEnd').value = endDate.toDateString();

        for (let i = 0; i < 14; i++) {
            let current = new Date(startVal);
            current.setDate(startDate.getDate() + i);
            const dayName = days[current.getDay() === 0 ? 6 : current.getDay() - 1];
            document.getElementById(`day-date-${i}`).innerText = `${dayName} ${current.getDate()}`;
        }
        saveData();
    }

    function saveData() {
        const data = {
            name: document.getElementById('userName').value,
            start: document.getElementById('dateStart').value,
            rows: []
        };
        for (let i = 0; i < 14; i++) {
            data.rows.push({
                start: document.getElementById(`start-${i}`).value,
                finish: document.getElementById(`finish-${i}`).value,
                break: document.getElementById(`break-${i}`).checked,
                site: document.getElementById(`site-${i}`).value
            });
        }
        localStorage.setItem('f_dtr_data', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('f_dtr_data');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('userName').value = data.name;
            document.getElementById('dateStart').value = data.start;
            updateDates();
            data.rows.forEach((row, i) => {
                document.getElementById(`start-${i}`).value = row.start;
                document.getElementById(`finish-${i}`).value = row.finish;
                document.getElementById(`break-${i}`).checked = row.break;
                document.getElementById(`site-${i}`).value = row.site;
            });
        }
    }

    // Signature Logic
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sig-modal').style.display = 'flex'; }
    function closeSig() { document.getElementById('sig-modal').style.display = 'none'; }
    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    canvas.onmousedown = () => drawing = true;
    window.onmouseup = () => drawing = false;
    canvas.onmousemove = (e) => {
        if (!drawing) return;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    };

    function saveSig() {
        const dataUrl = canvas.toDataURL();
        document.getElementById('sig-image').innerHTML = `<img src="${dataUrl}" style="height:100%">`;
        closeSig();
    }

    initTable();
</script>

</body>
</html>
