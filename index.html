<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frank S25 Ultra - DTR Maps</title>
    <style>
        /* [ROOT STYLES - HINDI NAGBAGO] */
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", sans-serif; overflow: hidden; touch-action: none; }
        .phone-frame { width: 360px; height: 740px; background: #000; border: 4px solid #333; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .camera-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #0a0a0a; border-radius: 50%; z-index: 5000; }
        .screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; position: relative; }
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 12px 20px; color: white; font-size: 13px; font-weight: 600; z-index: 500; position: absolute; top: 0; box-sizing: border-box; }
        
        /* Home Apps */
        .main-clock { margin-top: 60px; color: white; text-align: center; width: 100%; cursor: pointer; }
        #big-time { font-size: 72px; font-weight: 200; margin: 0; }
        .app-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: auto; margin-bottom: 50px; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon { width: 58px; height: 58px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 6px; }

        /* APP OVERLAY */
        .app-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 4000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .app-header { background: #f8f9fa; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; font-weight: bold; }

        /* DTR TABLE STYLE */
        .dtr-container { padding: 10px; flex: 1; overflow-y: auto; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #007bff; color: white; padding: 8px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; }
        
        /* Eto yung "Magic" Site Link */
        .site-link { color: #007bff; text-decoration: underline; cursor: pointer; font-weight: bold; }
        .comment-text { font-style: italic; color: #555; font-size: 11px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="camera-hole"></div>
    <div class="status-bar"><span id="status-time">00:00</span><div>100% 🔋</div></div>

    <div class="screen">
        <div class="main-clock"><h1 id="big-time">00:00</h1><p id="big-date">Loading...</p></div>
        <div class="app-grid">
            <div class="app-item" onclick="openApp('dtr')">
                <div class="icon" style="background: #fff; border: 1px solid #ddd;">📅</div>
                <span class="label">DTR Map</span>
            </div>
            <div class="app-item" onclick="openApp('planner')"><div class="icon" style="background: #34495e;">📐</div><span class="label">Planner</span></div>
            <div class="app-item" onclick="openApp('tapo')"><div class="icon" style="background: #00a0e9;">📹</div><span class="label">Tapo</span></div>
        </div>
    </div>

    <div id="dtrOverlay" class="app-overlay">
        <div class="app-header">
            <span>Daily Time Record</span>
            <span onclick="closeApps()" style="cursor:pointer">✕</span>
        </div>
        <div class="dtr-container">
            <p style="color: #666;">*Click the <b>Site</b> name to open Google Maps NZ.</p>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Site (Location)</th>
                        <th>Comment</th>
                    </tr>
                </thead>
                <tbody id="dtrBody">
                    <tr>
                        <td>May 4</td>
                        <td><span class="site-link" onclick="searchMap('Hamilton East, NZ')">Hamilton East</span></td>
                        <td class="comment-text">Living Room Plastering Done</td>
                    </tr>
                    <tr>
                        <td>May 5</td>
                        <td><span class="site-link" onclick="searchMap('Chartwell Shopping Centre, Hamilton, NZ')">Chartwell Site</span></td>
                        <td class="comment-text">GIB Stopping - Ongoing</td>
                    </tr>
                    <tr>
                        <td>May 6</td>
                        <td><span class="site-link" onclick="searchMap('Rototuna, Hamilton, NZ')">Rototuna North</span></td>
                        <td class="comment-text">Waiting for drying</td>
                    </tr>
                </tbody>
            </table>
            <button onclick="addEntry()" style="margin-top:20px; width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px;">+ Add New Entry</button>
        </div>
    </div>

    <div id="tapoOverlay" class="app-overlay"><div class="app-header"><span>Tapo Live</span><span onclick="closeApps()">✕</span></div></div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('status-time').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('big-time').textContent = document.getElementById('status-time').textContent;
        document.getElementById('big-date').textContent = now.toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock();

    function openApp(id) {
        closeApps();
        if(id === 'dtr') document.getElementById('dtrOverlay').style.display = 'flex';
    }
    function closeApps() {
        document.getElementById('dtrOverlay').style.display = 'none';
    }

    // --- ETO YUNG PINAGMAMALAKI KO, FRANK! ---
    function searchMap(location) {
        // Gagawa tayo ng Google Maps Search URL base sa Site name
        const mapUrl = "https://www.google.com/maps/search/" + encodeURIComponent(location);
        // Bubuksan nito ang Maps app sa phone mo o bagong tab
        window.open(mapUrl, '_blank');
    }

    function addEntry() {
        const site = prompt("Saan ang Site? (e.g. Te Rapa)");
        const comment = prompt("Anong comment?");
        if(site && comment) {
            const table = document.getElementById('dtrBody');
            const row = table.insertRow();
            row.innerHTML = `
                <td>Today</td>
                <td><span class="site-link" onclick="searchMap('${site}, New Zealand')">${site}</span></td>
                <td class="comment-text">${comment}</td>
            `;
        }
    }
</script>

</body>
</html>
