<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank S25 Ultra Pro</title>
    <style>
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; touch-action: none; }
        .phone-frame { width: 360px; height: 740px; background: #000; border: 4px solid #333; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .camera-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #0a0a0a; border-radius: 50%; z-index: 100; }
        .screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 12px 20px 0 20px; color: white; font-size: 13px; font-weight: 600; z-index: 50; box-sizing: border-box; }
        
        /* Clock Section */
        .main-clock { margin-top: 60px; color: white; text-align: center; text-decoration: none; width: 100%; display: block; transition: 0.1s; }
        .main-clock:active { transform: scale(0.95); opacity: 0.8; }
        #big-time { font-size: 72px; font-weight: 200; margin: 0; letter-spacing: -2px; }
        #big-date { font-size: 16px; margin-top: -5px; opacity: 0.9; }

        /* App Grid Section */
        .app-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: auto; margin-bottom: 50px; position: relative; }
        .app-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        .icon { width: 58px; height: 58px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); pointer-events: none; }
        .label { color: white; font-size: 11px; text-shadow: 1px 1px 3px #000; pointer-events: none; }
        
        .dragging { opacity: 0.5; transform: scale(1.1); z-index: 1000; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera-hole"></div>
        <div class="status-bar">
            <span id="status-time">00:00</span>
            <div><span id="battery-level">--%</span> 🔋</div>
        </div>

        <div class="screen">
            <a href="clock-app.html" class="main-clock">
                <h1 id="big-time">00:00</h1>
                <p id="big-date">Date Loading...</p>
            </a>

            <div class="app-grid" id="appGrid">
                <a href="dtr-app.html" class="app-item" data-app="dtr">
                    <div class="icon" style="background: white;">📅</div>
                    <span class="label">DTR</span>
                </a>
                <a href="solar-app.html" class="app-item" data-app="solar">
                    <div class="icon" style="background: linear-gradient(135deg, #FF8C00, #FFD700);">☀️</div>
                    <span class="label">Solar</span>
                </a>
                <a href="tapo://" class="app-item" data-app="tapo">
                    <div class="icon" style="background: #00a0e9;">📹</div>
                    <span class="label">Tapo</span>
                </a>
                <a href="messenger-app.html" class="app-item" data-app="chat">
                    <div class="icon" style="background: linear-gradient(135deg, #00B2FF, #006AFF);">💬</div>
                    <span class="label">Chat</span>
                </a>
                <a href="camera-app.html" class="app-item" data-app="camera">
                    <div class="icon" style="background: #f0f0f0;">📷</div>
                    <span class="label">Camera</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 1. Clock & Battery logic
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const time = h + ":" + m;
            document.getElementById('status-time').textContent = time;
            document.getElementById('big-time').textContent = time;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('big-date').textContent = now.toLocaleDateString('en-PH', options);
        }

        async function updateBattery() {
            try {
                const b = await navigator.getBattery();
                document.getElementById('battery-level').textContent = Math.floor(b.level * 100) + "%";
            } catch (e) { document.getElementById('battery-level').textContent = "100%"; }
        }

        // 2. Drag & Drop with Click Support
        const grid = document.getElementById('appGrid');
        let dragItem = null;
        let isMoving = false;
        let startX, startY;

        grid.addEventListener('touchstart', (e) => {
            const target = e.target.closest('.app-item');
            if (target) {
                dragItem = target;
                isMoving = false;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                
                // Munting delay bago mag-activate ang dragging visual
                setTimeout(() => {
                    if(dragItem === target && !isMoving) dragItem.classList.add('dragging');
                }, 200);
            }
        }, {passive: false});

        grid.addEventListener('touchmove', (e) => {
            if (!dragItem) return;
            
            const moveX = Math.abs(e.touches[0].clientX - startX);
            const moveY = Math.abs(e.touches[0].clientY - startY);
            
            if (moveX > 10 || moveY > 10) {
                isMoving = true;
                e.preventDefault();
                dragItem.classList.add('dragging');
                
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const closest = target ? target.closest('.app-item') : null;

                if (closest && closest !== dragItem) {
                    const children = Array.from(grid.children);
                    const dragIdx = children.indexOf(dragItem);
                    const targetIdx = children.indexOf(closest);

                    if (dragIdx < targetIdx) {
                        grid.insertBefore(dragItem, closest.nextSibling);
                    } else {
                        grid.insertBefore(dragItem, closest);
                    }
                }
            }
        }, {passive: false});

        grid.addEventListener('touchend', (e) => {
            if (dragItem) {
                // KUNG HINDI GUMALAW, ITREAT AS CLICK
                if (!isMoving) {
                    const url = dragItem.getAttribute('href');
                    window.location.href = url;
                }
                dragItem.classList.remove('dragging');
                dragItem = null;
            }
        });

        setInterval(updateClock, 1000);
        updateClock();
        updateBattery();
    </script>
</body>
</html>
