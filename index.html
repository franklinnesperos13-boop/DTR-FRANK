
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Time Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #525659; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 850px; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #timesheet { background: white; width: 210mm; padding: 10mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.5); position: relative; }
        .header-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-row { border-bottom: 1px solid #000; margin-bottom: 8px; padding: 2px; font-size: 13px; display: flex; }
        .input-row label { font-weight: bold; width: 120px; }
        select, input { border: none; outline: none; flex: 1; font-size: 13px; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { background: #e9ecef; border: 1px solid #ccc; padding: 6px; }
        td { border: 1px solid #ccc; padding: 3px; text-align: center; }
        
        .week-gap { height: 20px; background: #525659; border: none; }
        .sunday-row { color: red; font-weight: bold; }
        .total-row { background: #f8f9fa; font-weight: bold; }
        
        select.t-select { width: 100%; appearance: none; text-align: center; cursor: pointer; }
        .site-input { width: 100%; border: none; outline: none; }
        .site-container { position: relative; }
        .sugg { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 10; display: none; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .s-item { padding: 5px; cursor: pointer; border-bottom: 1px solid #eee; }

        /* Signature Modal */
        #sigModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; width: 350px; text-align: center; }
        canvas { border: 1px solid #000; background: #fff; width: 100%; height: 150px; touch-action: none; }
        .sig-img { width: 80px; cursor: pointer; border-bottom: 1px dashed #ccc; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-main" onclick="printPDF()">📄 Print / Save as PDF</button>
    </div>

    <div id="timesheet">
        <div class="header-section">
            <div>
                <div class="input-row"><label>NAME:</label>
                    <select id="userName">
                        <option>Franklin Nesperos</option>
                        <option>Elmer Cabaña</option>
                        <option>Larry Labrador</option>
                    </select>
                </div>
                <div class="input-row"><label>POSITION:</label><input type="text" value="Plasterer"></div>
            </div>
            <div>
                <div class="input-row"><label>PERIOD ENDING:</label><input type="date" id="period"></div>
                <div class="input-row"><label>DATE:</label><input type="text" value="4 May 2026"></div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>DAY AND DATE</th>
                    <th>START</th>
                    <th>FINISH</th>
                    <th>TOTAL HOURS</th>
                    <th>OVERTIME</th>
                    <th>SITE / COMMENTS</th>
                </tr>
            </thead>
            <tbody id="sheet"></tbody>
            <tfoot>
                <tr class="total-row"><td colspan="3">GRAND TOTAL (14 DAYS)</td><td id="grandTotal">0.0</td><td colspan="2"></td></tr>
            </tfoot>
        </table>

        <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div style="text-align:center;">
                <img id="sigDisplay" class="sig-img" onclick="openSig()" alt="Click to Sign">
                <p style="font-size:12px; margin:0;">Employee Signature</p>
            </div>
            <div style="text-align:center; border-top: 1px solid #000; width: 150px;">
                <p style="font-size:12px; margin-top:5px;">Manager Signature</p>
            </div>
        </div>
    </div>

    <div id="sigModal">
        <div class="modal-box">
            <h3>Sign Here</h3>
            <canvas id="canvas"></canvas>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <button onclick="clearSig()" style="flex:1; padding:10px;">Clear</button>
                <button onclick="saveSig()" style="flex:1; padding:10px; background:green; color:white; border:none;">Save</button>
            </div>
        </div>
    </div>

<script>
    const days = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];
    const times = ["", "6:00 AM", "6:30 AM", "7:00 AM", "7:30 AM", "8:00 AM", "8:30 AM", "12:00 PM", "1:00 PM", "3:30 PM", "4:00 PM", "4:30 PM", "5:00 PM", "5:30 PM", "6:00 PM"];
    
    function buildTable() {
        const body = document.getElementById('sheet');
        for (let w = 0; w < 2; w++) {
            days.forEach((day, i) => {
                const isSun = (day === "SUNDAY");
                const row = document.createElement('tr');
                if(isSun) row.className = "sunday-row";
                
                row.innerHTML = `
                    <td>${day}</td>
                    <td><select class="t-start" onchange="calc(this)">${times.map(t => `<option ${!isSun && t=='7:00 AM'?'selected':''}>${t}</option>`).join('')}</select></td>
                    <td><select class="t-end" onchange="calc(this)">${times.map(t => `<option ${!isSun && t=='5:00 PM'?'selected':''}>${t}</option>`).join('')}</select></td>
                    <td class="row-total">${isSun?'0.0':'9.5'}</td>
                    <td><input type="text" value="0" style="width:20px; text-align:center;"></td>
                    <td class="site-container"><input type="text" class="site-input" placeholder="..." oninput="findSite(this)"><div class="sugg"></div></td>
                `;
                body.appendChild(row);
            });
            if(w === 0) {
                const gap = document.createElement('tr');
                gap.innerHTML = `<td colspan="6" class="week-gap"></td>`;
                body.appendChild(gap);
            }
        }
        updateGrand();
    }

    function calc(el) {
        const row = el.closest('tr');
        const sVal = row.querySelector('.t-start').value;
        const eVal = row.querySelector('.t-end').value;
        let total = 0;
        if(sVal && eVal) {
            const start = new Date("1970/01/01 " + sVal);
            const end = new Date("1970/01/01 " + eVal);
            let diff = (end - start) / 1000 / 60 / 60;
            if(diff < 0) diff += 24;
            // Breaktime Logic: Kung natapat sa 12pm-1pm, bawas 0.5 (unpaid)
            if(diff >= 5) diff -= 0.5; 
            total = diff > 0 ? diff : 0;
        }
        row.querySelector('.row-total').textContent = total.toFixed(1);
        updateGrand();
    }

    function updateGrand() {
        let sum = 0;
        document.querySelectorAll('.row-total').forEach(td => sum += parseFloat(td.textContent));
        document.getElementById('grandTotal').textContent = sum.toFixed(1);
    }

    async function findSite(inp) {
        const box = inp.nextElementSibling;
        if(inp.value.length < 3) { box.style.display='none'; return; }
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${inp.value},+Hamilton,+NZ&limit=3`);
        const data = await r.json();
        box.innerHTML = "";
        if(data.length > 0) {
            box.style.display='block';
            data.forEach(d => {
                const item = document.createElement('div'); item.className='s-item';
                item.textContent = d.display_name.split(', New Zealand')[0];
                item.onclick = () => { inp.value = item.textContent; box.style.display='none'; };
                box.appendChild(item);
            });
        }
    }

    // Canvas Signature Logic
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sigModal').style.display='flex'; canvas.width = canvas.offsetWidth; ctx.lineWidth=2; }
    function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function saveSig() {
        document.getElementById('sigDisplay').src = canvas.toDataURL();
        document.getElementById('sigModal').style.display='none';
    }
    canvas.addEventListener('touchstart', e => { drawing=true; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); e.preventDefault(); });
    canvas.addEventListener('touchmove', e => { if(!drawing) return; const r=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing=false);

    function printPDF() {
        const element = document.getElementById('timesheet');
        html2pdf().from(element).set({ margin: 5, filename: 'DTR_Frank.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' }}).save();
    }

    buildTable();
</script>
</body>
</html>
