<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Time Sheet - Frank</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #525659; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 850px; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 10px; }
        .btn-pdf { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #timesheet { background: white; width: 210mm; padding: 10mm; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .header-table { width: 100%; margin-bottom: 20px; }
        .header-table td { border-bottom: 1px solid #000; padding: 5px; font-size: 13px; }
        .label { font-weight: bold; text-transform: uppercase; width: 100px; }

        table.main-sheet { width: 100%; border-collapse: collapse; font-size: 10px; }
        table.main-sheet th { background: #e9ecef; border: 1px solid #ccc; padding: 5px; text-transform: uppercase; }
        table.main-sheet td { border: 1px solid #ccc; padding: 2px; text-align: center; height: 25px; }
        
        .day-cell { background: #f4f7f9; text-align: left !important; padding-left: 10px !important; font-weight: bold; width: 120px; }
        .sunday { color: red; }
        
        select { width: 100%; border: none; background: transparent; font-size: 10px; appearance: none; text-align: center; cursor: pointer; }
        input.text-in { width: 100%; border: none; background: transparent; font-size: 10px; text-align: left; padding-left: 5px; }
        .total-hrs { font-weight: bold; color: #0056b3; width: 60px; }
        
        .footer { margin-top: 30px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-pdf" onclick="saveAsPDF()">📥 SAVE AS PDF TO SEND BOSS</button>
    </div>

    <div id="timesheet">
        <table class="header-table">
            <tr>
                <td class="label">NAME:</td>
                <td>Franklin Nesperos</td>
                <td class="label">PERIOD ENDING:</td>
                <td><input type="text" value="05/03/2026" style="border:none; width:100px;"></td>
            </tr>
            <tr>
                <td class="label">POSITION:</td>
                <td>Plasterer</td>
                <td class="label">DATE:</td>
                <td>4 May 2026</td>
            </tr>
        </table>

        <table class="main-sheet">
            <thead>
                <tr>
                    <th rowspan="2">DAY AND DATE</th>
                    <th colspan="2">TIME WORKED (12hr)</th>
                    <th rowspan="2">TOTAL HOURS</th>
                    <th rowspan="2">OVERTIME</th>
                    <th rowspan="2">MANAGERS SIGNATURE</th>
                    <th rowspan="2">COMMENTS / SITE</th>
                </tr>
                <tr>
                    <th>START</th>
                    <th>FINISH</th>
                </tr>
            </thead>
            <tbody id="sheetBody"></tbody>
        </table>
    </div>

<script>
    const days = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];
    const dates = ["20 Apr", "21 Apr", "22 Apr", "23 Apr", "24 Apr", "25 Apr", "26 Apr", "27 Apr", "28 Apr", "29 Apr", "30 Apr", "1 May", "2 May", "3 May"];
    
    const times = ["", "6:00 AM", "6:30 AM", "7:00 AM", "7:30 AM", "8:00 AM", "3:30 PM", "4:00 PM", "4:30 PM", "5:00 PM", "5:30 PM", "6:00 PM"];

    const tbody = document.getElementById('sheetBody');

    for (let i = 0; i < 14; i++) {
        const dayName = days[i % 7];
        const dateStr = dates[i];
        const isSunday = dayName === "SUNDAY";

        for (let j = 0; j < 3; j++) { // 3 rows per day based on your photo
            const row = document.createElement('tr');
            const isFirst = (j === 0);
            
            row.innerHTML = `
                ${isFirst ? `<td class="day-cell ${isSunday ? 'sunday' : ''}" rowspan="3">${dayName}<br>${dateStr}</td>` : ''}
                <td>
                    <select class="start" onchange="calculate(this)">
                        ${times.map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <select class="finish" onchange="calculate(this)">
                        ${times.map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                </td>
                <td class="total-hrs">0.0</td>
                <td>0</td>
                <td></td>
                <td><input type="text" class="text-in" placeholder="..."></td>
            `;
            tbody.appendChild(row);
        }
    }

    function calculate(el) {
        const row = el.closest('tr');
        const start = row.querySelector('.start').value;
        const finish = row.querySelector('.finish').value;
        const totalCell = row.querySelector('.total-hrs');

        if (start && finish) {
            let s = new Date("1970/01/01 " + start);
            let f = new Date("1970/01/01 " + finish);
            if (f < s) f.setDate(f.getDate() + 1);
            let diff = (f - s) / 1000 / 60 / 60;
            totalCell.textContent = diff.toFixed(1);
        } else {
            totalCell.textContent = "0.0";
        }
    }

    function saveAsPDF() {
        const element = document.getElementById('timesheet');
        html2pdf().from(element).set({
            margin: 5,
            filename: 'Frank_TimeSheet.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }
</script>
</body>
</html>
