<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank S25 Ultra</title>
    <style>
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .phone-frame { width: 350px; height: 720px; background: #000; border: 4px solid #333; border-radius: 25px; position: relative; overflow: hidden; }
        .screen { 
            width: 100%; height: 100%; 
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
            padding: 60px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; grid-auto-rows: min-content; box-sizing: border-box;
        }
        .status-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; color: white; font-size: 12px; z-index: 10; }
        .app-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .icon { width: 60px; height: 60px; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.1s; }
        .app-item:active .icon { transform: scale(0.9); }
        .label { color: white; font-size: 11px; text-align: center; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar"><span>8:30</span><span>🔋 65%</span></div>
        <div class="screen">
            
            <a href="dtr-app.html" class="app-item">
                <div class="icon" style="background: white;">📅</div>
                <span class="label">DTR Frank</span>
            </a>

            <a href="messenger-app.html" class="app-item">
                <div class="icon" style="background: linear-gradient(135deg, #00B2FF, #006AFF);">💬</div>
                <span class="label">Messenger</span>
            </a>

            <a href="https://www.youtube.com" target="_blank" class="app-item">
                <div class="icon" style="background: white;">🛑</div>
                <span class="label">YouTube</span>
            </a>

            <a href="camera-app.html" class="app-item">
                <div class="icon" style="background: #f0f0f0;">📷</div>
                <span class="label">Camera</span>
            </a>

            <a href="intent://#Intent;package=com.haugland.worldofairports;scheme=android-app;end" class="app-item">
                <div class="icon" style="background: #1e3c72;">✈️</div>
                <span class="label">WOA</span>
            </a>

            <div class="app-item" onclick="alert('One UI 7.0 Settings')">
                <div class="icon" style="background: #8e8e93;">⚙️</div>
                <span class="label">Settings</span>
            </div>

        </div>
    </div>
</body>
</html>
