<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franklin DTR - Fortnightly</title>
    <style>
        /* --- LAYOUT SA SCREEN (Walang nagbago rito) --- */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #2196F3; color: white; }
        input { width: 90%; border: none; text-align: center; font-size: 14px; outline: none; }
        .btn-container { text-align: center; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; color: white; margin: 5px; }
        .print-btn { background-color: #27ae60; }
        .save-btn { background-color: #2980b9; }

        /* --- HETO ANG MAGIC PARA SA PDF (LANDSCAPE & SIDE-BY-SIDE) --- */
        @media print {
            @page { 
                size: landscape; 
                margin: 5mm; 
            }
            
            body { background: white; padding: 0; }
            .container { max-width: 100% !important; box-shadow: none; padding: 0; margin: 0; }
            
            /* Pinipilit ang Tables na magtabi (Flexbox) */
            .tables-wrapper { 
                display: flex !important; 
                flex-direction: row !important; 
                justify-content: space-between !important; 
                gap: 10px; 
                width: 100%;
            }

            table { 
                width: 49% !important; /* Halos kalahati ng page ang bawat table */
                margin-bottom: 0;
                font-size: 11px; /* Nililiitan para siguradong kasya */
            }

            th, td { padding: 6px !important; }

            /* Tinatago ang mga buttons sa PDF */
            .no-print, button, .btn-container { 
                display: none !important; 
            }
            
            h2 { font-size: 18px; margin-top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DTR: Week 1 & Week 2</h2>

    <!-- Wrapper para sa side-by-side layout sa PDF -->
    <div class="tables-wrapper">
        
        <!-- WEEK 1 TABLE -->
        <table id="week1">
            <thead>
                <tr><th colspan="3">WEEK 1</th></tr>
                <tr><th>Day</th><th>Hours</th><th>Site / Work</th></tr>
            </thead>
            <tbody>
                <tr><td>Mon</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Tue</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Wed</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Thu</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Fri</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Sat</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
                <tr><td>Sun</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
            </tbody>
        </table>

        <!-- WEEK 2 TABLE -->
        <table id="week2">
            <thead>
                <tr><th colspan="3" style="background-color: #1976D2;">WEEK 2</th></tr>
                <tr><th>Day</th><th>Hours</th><th>Site / Work</th></tr>
            </thead>
            <tbody>
                <tr><td>Mon</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Tue</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Wed</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Thu</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Fri</td><td><input type="number" value="8"></td><td><input type="text"></td></tr>
                <tr><td>Sat</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
                <tr><td>Sun</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
            </tbody>
        </table>
    </div>

    <div class="btn-container no-print">
        <button class="save-btn" onclick="window.print()">Save as PDF</button>
    </div>
</div>

</body>
</html>
