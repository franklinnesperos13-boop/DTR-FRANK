<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franklin DTR - Professional</title>
    <style>
        body { font-family: 'Helvetica', Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-top: 10px solid #c0392b; }
        
        .header-info { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .info-box { flex: 1; min-width: 200px; }
        .info-box label { font-weight: bold; font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
        .info-box span { font-size: 16px; border-bottom: 1px solid #ccc; display: block; padding: 2px 0; min-height: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th { background-color: #f8f8f8; color: #555; font-weight: bold; padding: 10px; border: 1px solid #ddd; text-transform: uppercase; }
        td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        
        input { width: 100%; border: none; text-align: center; font-size: 12px; background: transparent; padding: 5px 0; }
        input[type="text"] { text-align: left; padding-left: 5px; }
        .total-cell { font-weight: bold; background: #fafafa; }

        .no-print-section { text-align: center; margin-top: 20px; }
        .btn-print { background: #c0392b; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        @media print {
            @page { size: portrait; margin: 10mm; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border-top: none; width: 100%; max-width: 100%; }
            .no-print-section { display: none; }
            input { border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <div class="info-box"><label>NAME:</label><span>Franklin Nesperos</span></div>
        <div class="info-box"><label>DATE (START):</label><span><input type="text" placeholder="-- / -- / --"></span></div>
        <div class="info-box"><label>POSITION:</label><span>Plasterer</span></div>
        <div class="info-box"><label>PERIOD ENDING:</label><span><input type="text" placeholder="-- / -- / --"></span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="15%">DAY AND DATE</th>
                <th width="10%">START</th>
                <th width="10%">FINISH</th>
                <th width="8%">NO BREAK</th>
                <th width="10%">TOTAL</th>
                <th>SITE / COMMENTS</th>
            </tr>
        </thead>
        <tbody id="dtr-body">
            <!-- Bubuo tayo ng 14 rows para sa 2 weeks -->
        </tbody>
    </table>

    <div class="no-print-section">
        <button class="btn-print" onclick="window.print()">SAVE AS PDF</button>
    </div>
</div>

<script>
    const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const tbody = document.getElementById('dtr-body');

    for (let i = 0; i < 14; i++) {
        let dayName = days[i % 7];
        let row = `
            <tr>
                <td><input type="text" value="${dayName} ---"></td>
                <td><input type="text" placeholder="07:30"></td>
                <td><input type="text" placeholder="17:00"></td>
                <td><input type="checkbox"></td>
                <td class="total-cell">0.0</td>
                <td><input type="text" placeholder="..."></td>
            </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
    }
</script>

</body>
</html>
