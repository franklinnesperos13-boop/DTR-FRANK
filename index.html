<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank S25 Ultra Pro</title>
    <style>
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        .phone-frame { width: 360px; height: 740px; background: #000; border: 4px solid #444; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .camera-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #0a0a0a; border-radius: 50%; border: 1px solid #1a1a1a; z-index: 100; }
        .screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px 0 20px; color: white; font-size: 13px; font-weight: 600; z-index: 50; box-sizing: border-box; }
        .main-clock { margin-top: 60px; color: white; text-align: center; transition: transform 0.1s; }
        .main-clock:active { transform: scale(0.95); opacity: 0.8; }
        #big-time { font-size: 72px; font-weight: 200; margin: 0; letter-spacing: -2px; }
        #big-date { font-size: 16px; margin-top: -5px; opacity: 0.9; }
        .app-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: auto; margin-bottom: 50px; }
        .app-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .icon { width: 58px; height: 58px; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .label { color: white; font-size: 11px; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera-hole"></div>
        <div class="status-bar">
            <span id="status-time">00:00</span>
            <div><span id="battery-level">--%</span> 🔋</div>
        </div>

        <div class="screen">
            <a href="clock-app.html" style="text-decoration: none; width: 100%; display: block;">
                <div class="main-clock">
                    <h1 id="big-time">00:00</h1>
                    <p id="big-date">Date Loading...</p>
                </div>
            </a>

            <div class="app-grid">
                <a href="dtr-app.html" class="app-item">
                    <div class="icon" style="background: white;">📅</div>
                    <span class="label">DTR</span>
                </a>
                <a href="messenger-app.html" class="app-item">
                    <div class="icon" style="background: linear-gradient(135deg, #00B2FF, #006AFF);">💬</div>
                    <span class="label">Messenger</span>
                </a>
                <a href="https://www.youtube.com" target="_blank" class="app-item">
                    <div class="icon" style="background: white;">🛑</div>
                    <span class="label">YouTube</span>
                </a>
                <a href="camera-app.html" class="app-item">
                    <div class="icon" style="background: #f0f0f0;">📷</div>
                    <span class="label">Camera</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('status-time').textContent = timeString;
            document.getElementById('big-time').textContent = timeString;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('big-date').textContent = now.toLocaleDateString('en-PH', options);
        }
        async function updateBattery() {
            try {
                const b = await navigator.getBattery();
                document.getElementById('battery-level').textContent = Math.floor(b.level * 100) + "%";
            } catch (e) { document.getElementById('battery-level').textContent = "100%"; }
        }
        setInterval(updateClock, 1000);
        updateClock();
        updateBattery();
    </script>
</body>
</html>
