<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Interiors - Daily Time Sheet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #444; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 850px; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .btn-main { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        #timesheet { background: white; width: 210mm; padding: 15mm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        
        /* Watermark Background */
        #timesheet::before {
            content: "JP INTERIORS\a LIMITED";
            white-space: pre;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            color: rgba(0, 0, 0, 0.04);
            font-weight: 900;
            text-align: center;
            z-index: 0;
            pointer-events: none;
            width: 100%;
        }

        .header-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; position: relative; z-index: 1; }
        .input-row { border-bottom: 1px solid #333; margin-bottom: 12px; padding: 5px; font-size: 14px; display: flex; }
        .input-row label { font-weight: bold; width: 130px; color: #333; }
        select, input { border: none; outline: none; flex: 1; font-size: 14px; background: transparent; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; position: relative; z-index: 1; background: rgba(255,255,255,0.7); }
        th { background: #f0f0f0; border: 1px solid #bbb; padding: 8px; text-transform: uppercase; }
        td { border: 1px solid #bbb; padding: 5px; text-align: center; }
        
        .week-gap { height: 15px; background: #eee; border: none; }
        .sunday-row { color: #d9534f; font-weight: bold; }
        .total-row { background: #f9f9f9; font-weight: bold; font-size: 13px; }
        
        select.t-select { width: 100%; appearance: none; text-align: center; cursor: pointer; border: 1px solid #eee; border-radius: 4px; }
        .site-input { width: 100%; border: none; outline: none; background: transparent; }
        .site-container { position: relative; }
        .sugg { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 100; display: none; text-align: left; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .s-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .s-item:hover { background: #f0f0f0; }

        /* Signature Section */
        .footer-sig { margin-top: 50px; display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 1; }
        .sig-box { text-align: center; width: 200px; }
        .sig-display { width: 100px; height: 50px; cursor: pointer; border-bottom: 2px solid #333; margin-bottom: 5px; object-fit: contain; }

        #sigModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 400px; text-align: center; }
        canvas { border: 2px dashed #007bff; background: #fff; width: 100%; height: 200px; touch-action: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-main" onclick="printPDF()">💾 Print / Save as PDF</button>
    </div>

    <div id="timesheet">
        <div class="header-section">
            <div>
                <div class="input-row"><label>NAME:</label>
                    <select id="userName">
                        <option>Franklin Nesperos</option>
                        <option>Elmer Cabaña</option>
                        <option>Larry Labrador</option>
                    </select>
                </div>
                <div class="input-row"><label>POSITION:</label><input type="text" value="Plasterer"></div>
            </div>
            <div>
                <div class="input-row"><label>PERIOD ENDING:</label><input type="date" id="period" onchange="updateDates()"></div>
                <div class="input-row"><label>DATE ISSUED:</label><input type="text" id="dateIssued"></div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="15%">DAY AND DATE</th>
                    <th width="15%">START</th>
                    <th width="15%">FINISH</th>
                    <th width="15%">TOTAL HOURS</th>
                    <th width="40%">SITE / COMMENTS</th>
                </tr>
            </thead>
            <tbody id="sheet"></tbody>
            <tfoot>
                <tr class="total-row"><td colspan="3" style="text-align:right; padding-right:20px;">GRAND TOTAL (14 DAYS)</td><td id="grandTotal">0.0</td><td></td></tr>
            </tfoot>
        </table>

        <div class="footer-sig">
            <div class="sig-box">
                <img id="sigDisplay" class="sig-display" onclick="openSig()" title="Click to sign">
                <p style="font-size:12px; font-weight:bold;">Employee Signature</p>
            </div>
            <div class="sig-box">
                <div style="height:50px; border-bottom:2px solid #333; margin-bottom:5px;"></div>
                <p style="font-size:12px; font-weight:bold;">Manager Signature</p>
            </div>
        </div>
    </div>

    <div id="sigModal">
        <div class="modal-box">
            <h3>Digital Signature</h3>
            <canvas id="canvas"></canvas>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button onclick="clearSig()" style="flex:1; padding:12px; border-radius:5px; border:1px solid #ccc;">Clear</button>
                <button onclick="saveSig()" style="flex:1; padding:12px; background:#28a745; color:white; border:none; border-radius:5px; font-weight:bold;">Save Signature</button>
            </div>
        </div>
    </div>

<script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    
    // 15-Minute Interval Generator
    function generateTimes() {
        const t = [""];
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=15) {
                let hh = h % 12 || 12;
                let mm = m.toString().padStart(2, '0');
                let ampm = h < 12 ? "AM" : "PM";
                t.push(`${hh}:${mm} ${ampm}`);
            }
        }
        return t;
    }
    const times = generateTimes();

    function updateDates() {
        const periodIn = document.getElementById('period').value;
        if(!periodIn) return;
        const endDate = new Date(periodIn);
        const cells = document.querySelectorAll('.date-cell');
        
        // Mag-backtrack ng 13 days mula sa Period Ending
        for(let i=13; i>=0; i--) {
            let d = new Date(endDate);
            d.setDate(d.getDate() - i);
            let dayNum = d.getDate();
            let dayName = days[d.getDay() === 0 ? 6 : d.getDay() - 1];
            
            // Hanapin ang tamang cell base sa index (0-13)
            // Note: May gap row tayo kaya kailangan maingat sa indexing
            const index = 13 - i;
            const targetCell = document.getElementById(`date-${index}`);
            if(targetCell) targetCell.innerHTML = `${dayNum} <small>${dayName}</small>`;
        }
    }

    function buildTable() {
        const body = document.getElementById('sheet');
        document.getElementById('dateIssued').value = new Date().toLocaleDateString('en-GB');
        
        for (let w = 0; w < 2; w++) {
            days.forEach((day, i) => {
                const globalIdx = (w * 7) + i;
                const isSun = (day === "Sunday");
                const row = document.createElement('tr');
                if(isSun) row.className = "sunday-row";
                
                row.innerHTML = `
                    <td class="date-cell" id="date-${globalIdx}">${20 + globalIdx} <small>${day}</small></td>
                    <td><select class="t-select t-start" onchange="calc(this)">${times.map(t => `<option ${!isSun && t=='7:00 AM'?'selected':''}>${t}</option>`).join('')}</select></td>
                    <td><select class="t-select t-end" onchange="calc(this)">${times.map(t => `<option ${!isSun && t=='5:00 PM'?'selected':''}>${t}</option>`).join('')}</select></td>
                    <td class="row-total" style="font-weight:bold">${isSun?'0.0':'9.5'}</td>
                    <td class="site-container"><input type="text" class="site-input" placeholder="Type site..." oninput="findSite(this)"><div class="sugg"></div></td>
                `;
                body.appendChild(row);
            });
            if(w === 0) {
                const gap = document.createElement('tr');
                gap.innerHTML = `<td colspan="5" class="week-gap"></td>`;
                body.appendChild(gap);
            }
        }
        updateGrand();
    }

    function calc(el) {
        const row = el.closest('tr');
        const sVal = row.querySelector('.t-start').value;
        const eVal = row.querySelector('.t-end').value;
        let total = 0;
        if(sVal && eVal) {
            const start = new Date("1970/01/01 " + sVal);
            const end = new Date("1970/01/01 " + eVal);
            let diff = (end - start) / 1000 / 60 / 60;
            if(diff < 0) diff += 24;
            if(diff >= 5) diff -= 0.5; // Lunch break deduction
            total = diff > 0 ? diff : 0;
        }
        row.querySelector('.row-total').textContent = total.toFixed(1);
        updateGrand();
    }

    function updateGrand() {
        let sum = 0;
        document.querySelectorAll('.row-total').forEach(td => sum += parseFloat(td.textContent));
        document.getElementById('grandTotal').textContent = sum.toFixed(1);
    }

    async function findSite(inp) {
        const box = inp.nextElementSibling;
        if(inp.value.length < 3) { box.style.display='none'; return; }
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${inp.value},+Hamilton,+NZ&limit=3`);
        const data = await r.json();
        box.innerHTML = "";
        if(data.length > 0) {
            box.style.display='block';
            data.forEach(d => {
                const item = document.createElement('div'); item.className='s-item';
                item.textContent = d.display_name.split(', New Zealand')[0];
                item.onclick = () => { inp.value = item.textContent; box.style.display='none'; };
                box.appendChild(item);
            });
        }
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sigModal').style.display='flex'; canvas.width = canvas.offsetWidth; ctx.lineWidth=2; ctx.strokeStyle="#000"; }
    function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function saveSig() {
        const data = canvas.toDataURL();
        document.getElementById('sigDisplay').src = data;
        document.getElementById('sigModal').style.display='none';
    }
    canvas.addEventListener('touchstart', e => { drawing=true; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); e.preventDefault(); });
    canvas.addEventListener('touchmove', e => { if(!drawing) return; const r=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing=false);

    function printPDF() {
        const element = document.getElementById('timesheet');
        const opt = { margin: 5, filename: 'JP_Interiors_DTR.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().from(element).set(opt).save();
    }

    buildTable();
</script>
</body>
</html>
